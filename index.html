<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honolulu HVAC Services - Free Quote</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
.hero { background: linear-gradient(135deg, #0066cc 0%, #ff6b35 100%); color: white; padding: 60px 20px; text-align: center; }
.hero h1 { font-size: 2.5em; margin-bottom: 15px; }
.hero p { font-size: 1.1em; margin-bottom: 25px; }
.hero button { background: #ff6b35; color: white; padding: 15px 40px; border: none; border-radius: 5px; font-size: 1.1em; cursor: pointer; font-weight: bold; }
.hero button:hover { background: #ff8c42; }
.container { max-width: 900px; margin: 40px auto; padding: 20px; }
.form-section { background: white; padding: 40px; border-radius: 8px; margin-bottom: 30px; }
.form-section h2 { color: #0066cc; margin-bottom: 20px; font-size: 2em; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
.form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em; }
.submit-btn { background: #ff6b35; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 1em; font-weight: bold; cursor: pointer; }
.submit-btn:hover { background: #ff8c42; }
.success-msg { display: none; background: #4caf50; color: white; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
#chatbot-section { display: none; background: white; padding: 30px; border-radius: 8px; }
#chatbot-section h3 { color: #0066cc; margin-bottom: 20px; }
.chat-messages { background: #f9f9f9; height: 300px; overflow-y: auto; padding: 15px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #ddd; }
.msg { padding: 10px; margin-bottom: 10px; border-radius: 5px; }
.msg.bot { background: #0066cc; color: white; }
.msg.user { background: #ff6b35; color: white; text-align: right; }
.chat-input-row { display: flex; gap: 10px; }
#chat-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
#send-btn { background: #ff6b35; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
#send-btn:hover { background: #ff8c42; }
</style>
</head>
<body>

<div class="hero">
<h1>Honolulu HVAC Services</h1>
<p>Fast, reliable heating and cooling solutions</p>
<button onclick="document.querySelector('.form-section').scrollIntoView({behavior:'smooth'})">Get a Free Quote</button>
</div>

<div class="container">
<div class="form-section">
<h2>Request Your Free HVAC Quote</h2>
<div class="success-msg" id="success-msg">Thank you! We'll contact you soon.</div>
<form id="lead-form" action="https://formspree.io/f/xwvwzzjq" method="POST">
<div class="form-group">
<label>Name</label>
<input type="text" name="name" required>
</div>
<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>
<div class="form-group">
<label>Phone</label>
<input type="tel" name="phone" required>
</div>
<div class="form-group">
<label>Service Needed</label>
<input type="text" name="service" placeholder="e.g., AC Repair, Installation" required>
</div>
<div class="form-group">
<label>Message</label>
<textarea name="message" rows="4"></textarea>
</div>
<button type="submit" class="submit-btn">Send Request</button>
</form>
</div>

<div id="chatbot-section">
<h3>HVAC Assistant Chat</h3>
<div class="chat-messages" id="chat-messages"></div>
<div class="chat-input-row">
<input type="text" id="chat-input" placeholder="Ask about our services...">
<button id="send-btn">Send</button>
</div>
</div>
</div>

<script>
const form = document.getElementById('lead-form');
const successMsg = document.getElementById('success-msg');
const chatbotSection = document.getElementById('chatbot-section');

form.addEventListener('submit', function(e) {
e.preventDefault();
successMsg.style.display = 'block';
chatbotSection.style.display = 'block';
form.style.display = 'none';
chatbotSection.scrollIntoView({behavior:'smooth'});
fetch(form.action, { method: 'POST', body: new FormData(form) }).catch(err => console.log(err));
});

const chatMessages = document.getElementById('chat-messages');
const chatInput = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');

const responses = {
'hello': 'Hi! How can I help with your HVAC needs?',
'repair': 'We offer AC and heating repairs 24/7.',
'installation': 'We install new systems. Would you like a free quote?',
'price': 'Pricing varies by job. A technician will provide an exact estimate.',
'emergency': 'Yes! We handle emergency calls anytime.',
'default': 'Thanks for your question. A technician will follow up with you soon!'
};

function addMessage(text, sender) {
const msg = document.createElement('div');
msg.className = `msg ${sender}`;
msg.textContent = text;
chatMessages.appendChild(msg);
chatMessages.scrollTop = chatMessages.scrollHeight;
}

sendBtn.addEventListener('click', function() {
const text = chatInput.value.trim();
if (!text) return;
addMessage(text, 'user');
const reply = responses[text.toLowerCase()] || responses['default'];
setTimeout(() => addMessage(reply, 'bot'), 500);
chatInput.value = '';
});

chatInput.addEventListener('keypress', function(e) {
if (e.key === 'Enter') sendBtn.click();
});

// Initial greeting
setTimeout(() => addMessage('Hello! Welcome to Honolulu HVAC Services. How can I help?', 'bot'), 1000);
</script>

</body>
</html>
